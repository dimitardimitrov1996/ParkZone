<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <div><strong>ParkZone</strong></div>
</div>

<div class="container">

    <div class="card">

        <h2>Register</h2>

        <form th:action="@{/register}" th:object="${userRegisterRequest}" th:method="post">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" th:field="*{username}" required>
                <div class="alert-warning" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" th:field="*{email}" required>
                <div class="alert-warning" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" th:field="*{password}" required>
                <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button class="btn" type="submit">Create Account</button>

        </form>

    </div>

</div>

</body>
</html>
