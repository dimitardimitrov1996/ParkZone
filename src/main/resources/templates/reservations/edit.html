<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Reservation</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <div><strong>ParkZone</strong></div>
    <div>
        <a href="/home">Home</a>
        <a href="/reservations/create">Make a reservation</a>
        <a href="/reservations">History</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>Edit Reservation</h2>

        <form th:action="@{/reservations/edit/{id}(id=${reservationId})}"
              th:object="${reservationCreateRequestDTO}"
              method="post">

            <input type="hidden" name="_method" value="PUT">

            <div class="form-group">
                <label for="vehicleId">Vehicle</label>

                <select id="vehicleId" th:field="*{vehicleId}" required>
                    <option value="">Select vehicle</option>

                    <option th:each="v : ${vehicles}"
                            th:value="${v.id}"
                            th:text="${v.registrationNumber + ' - ' + v.brand + ' ' + v.model}">
                    </option>
                </select>

                <div class="error"
                     th:if="${#fields.hasErrors('vehicleId')}"
                     th:errors="*{vehicleId}">
                </div>
            </div>

            <div class="form-group">
                <label for="parkingLotId">Parking Lot</label>

                <select id="parkingLotId" th:field="*{parkingLotId}" required>
                    <option value="">Select parking lot</option>

                    <option th:each="p : ${parkingLots}"
                            th:value="${p.id}"
                            th:text="${p.name}">
                    </option>
                </select>

                <div class="error"
                     th:if="${#fields.hasErrors('parkingLotId')}"
                     th:errors="*{parkingLotId}">
                </div>
            </div>

            <div class="form-group">
                <label for="parkingSpotId">Parking Spot</label>

                <select id="parkingSpotId" th:field="*{parkingSpotId}" required>
                    <option value="">Select parking spot</option>

                    <option th:each="s : ${parkingSpots}"
                            th:value="${s.id}"
                            th:text="${s.parkingLot.name + ' - Spot ' + s.spotNumber + ' - ' +
                    (s.disabledSpot ? 'Disabled' :
                    (s.electricChargingSpot ? 'Electric charging' : 'Normal'))}">
                    </option>
                </select>

                <div class="error"
                     th:if="${#fields.hasErrors('parkingSpotId')}"
                     th:errors="*{parkingSpotId}">
                </div>
            </div>

            <div class="form-group">
                <label for="reservationType">Reservation Type</label>

                <select id="reservationType" th:field="*{reservationType}" required>
                    <option value="">Select reservation type</option>

                    <option th:each="type : ${T(bg.softuni.parkzone.model.entities.reservation.ReservationType).values()}"
                            th:value="${type}"
                            th:text="${type}">
                    </option>
                </select>

                <div class="error"
                     th:if="${#fields.hasErrors('reservationType')}"
                     th:errors="*{reservationType}">
                </div>
            </div>

            <div class="form-group">
                <label for="startDate">Start Date</label>

                <input id="startDate"
                       type="datetime-local"
                       th:field="*{startDate}"
                       required>

                <div class="error"
                     th:if="${#fields.hasErrors('startDate')}"
                     th:errors="*{startDate}">
                </div>
            </div>

            <div class="form-group">
                <label for="endDate">End Date</label>

                <input id="endDate"
                       type="datetime-local"
                       th:field="*{endDate}"
                       required>

                <div class="error"
                     th:if="${#fields.hasErrors('endDate')}"
                     th:errors="*{endDate}">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Save Changes</button>
                <a href="/reservations" class="btn-secondary">Back</a>
            </div>

        </form>

        <form th:action="@{/reservations/cancel/{id}(id=${reservationId})}"
              method="post"
              class="cancel-form">

            <button type="submit"
                    class="btn-danger"
                    onclick="return confirm('Are you sure you want to cancel this reservation?')">
                Cancel Reservation
            </button>

        </form>

    </div>

</div>
<script src="/js/reservation-date.js"></script>
<script src="/js/reservation-spot-filter.js"></script>
</body>
</html>
