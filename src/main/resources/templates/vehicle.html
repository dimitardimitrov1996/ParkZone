<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vehicle</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>.meta{margin:8px 0} .meta strong{display:inline-block;width:180px}</style>
</head>
<body>

<div class="navbar">
    <div><strong>ParkZone</strong></div>
    <div>
        <a href="/home">Home</a>
        <a href="/vehicles">Vehicles</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Vehicle Details</h2>

        <div th:if="${vehicle == null}">
            <p>Vehicle not found.</p>
        </div>

        <div th:if="${vehicle != null}">
            <div class="meta"><strong>Registration Number:</strong> <span th:text="${vehicle.registrationNumber}">ABC123</span></div>
            <div class="meta"><strong>Brand:</strong> <span th:text="${vehicle.brand}">Toyota</span></div>
            <div class="meta"><strong>Model:</strong> <span th:text="${vehicle.model}">Corolla</span></div>
            <div class="meta"><strong>Vehicle Type:</strong> <span th:text="${vehicle.vehicleType}">CAR</span></div>
            <div class="meta"><strong>Engine Type:</strong> <span th:text="${vehicle.engineType}">PETROL</span></div>
            <div class="meta"><strong>Disabled Parking Required:</strong> <span th:text="${vehicle.disabledParkingRequired} ? 'Yes' : 'No'">No</span></div>
            <div class="meta"><strong>Owner:</strong> <span th:text="${vehicle.owner != null} ? ${vehicle.owner.username} : '—'">owner</span></div>

            <div style="margin-top:16px">
                <a th:href="@{'/vehicles/' + ${vehicle.id} + '/edit'}" class="btn">Edit</a>
                <a th:href="@{'/vehicles'}" class="btn" style="background:#6c757d;margin-left:8px">Back</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
