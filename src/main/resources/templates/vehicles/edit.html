<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Edit Vehicle</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
	<div><strong>ParkZone</strong></div>
	<div>
		<a href="/vehicles">Back to Vehicles</a>
		<a href="/home">Home</a>
		<a href="/logout">Logout</a>
	</div>
</div>

<div class="container">

	<div class="card">
		<h2>Edit Vehicle</h2>

		<form th:action="@{/vehicles/edit/{id}(id=${vehicleId})}"
		      th:object="${vehicleEditDTO}"
		      method="post">

			<input type="hidden" name="_method" value="PUT">

			<div class="form-group">
				<label>Registration Number</label>
				<input type="text" th:field="*{registrationNumber}" required>
				<div class="error" th:if="${#fields.hasErrors('registrationNumber')}" th:errors="*{registrationNumber}"></div>
			</div>

			<div class="form-group">
				<label>Brand</label>
				<input type="text" th:field="*{brand}" required>
				<div class="error" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
			</div>

			<div class="form-group">
				<label>Model</label>
				<input type="text" th:field="*{model}" required>
				<div class="error" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
			</div>

			<div class="form-group">
				<label>Vehicle Type</label>
				<select th:field="*{vehicleType}" required>
					<option th:each="t : ${T(bg.softuni.parkzone.model.entities.vehicle.VehicleType).values()}"
					        th:value="${t}"
					        th:text="${t}">
					</option>
				</select>
				<div class="error" th:if="${#fields.hasErrors('vehicleType')}" th:errors="*{vehicleType}"></div>
			</div>

			<div class="form-group">
				<label>Engine Type</label>
				<select th:field="*{engineType}" required>
					<option th:each="e : ${T(bg.softuni.parkzone.model.entities.vehicle.EngineType).values()}"
					        th:value="${e}"
					        th:text="${e}">
					</option>
				</select>
				<div class="error" th:if="${#fields.hasErrors('engineType')}" th:errors="*{engineType}"></div>
			</div>

			<div class="form-group">
				<label>
					<input type="checkbox" th:field="*{disabledParkingRequired}">
					<div class="error" th:if="${#fields.hasErrors('disabledParkingRequired')}" th:errors="*{disabledParkingRequired}"></div>
					Disabled parking required
				</label>
			</div>

			<button class="btn" type="submit">Save Changes</button>
		</form>

	</div>

</div>

</body>
</html>
