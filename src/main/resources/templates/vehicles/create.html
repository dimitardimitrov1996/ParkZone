<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Add Vehicle</title>
	<link rel="stylesheet" href="/css/style.css">
	<style>.form-group{margin-bottom:12px}.error{color:#c62828;font-size:12px}</style>
</head>
<body>

<div class="navbar">
	<div><strong>ParkZone</strong></div>
	<div>
		<a href="/vehicles">Back to Vehicles</a>
		<a href="/home">Home</a>
		<a href="/logout">Logout</a>
	</div>
	</div>

<div class="container">

	<div class="card">
		<h2>Add Vehicle</h2>

		<form th:action="@{/vehicles/create}" th:object="${vehicleCreateRequest}" th:method="post">

			<div class="form-group">
				<label>Registration Number</label>
				<input type="text" th:field="*{registrationNumber}" required>
				<div class="error" th:if="${#fields.hasErrors('registrationNumber')}" th:errors="*{registrationNumber}"></div>
			</div>

			<div class="form-group">
				<label>Brand</label>
				<input type="text" th:field="*{brand}" required>
				<div class="error" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
			</div>

			<div class="form-group">
				<label>Model</label>
				<input type="text" th:field="*{model}" required>
				<div class="error" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
			</div>

			<div class="form-group">
				<label>Vehicle Type</label>
				<select th:field="*{vehicleType}" required>
					<option th:each="t : ${T(bg.softuni.parkzone.model.entities.vehicle.VehicleType).values()}" th:value="${t}" th:text="${t}"></option>
				</select>
			</div>

			<div class="form-group">
				<label>Engine Type</label>
				<select th:field="*{engineType}" required>
					<option th:each="e : ${T(bg.softuni.parkzone.model.entities.vehicle.EngineType).values()}" th:value="${e}" th:text="${e}"></option>
				</select>
			</div>

			<div class="form-group">
				<label>
					<input type="checkbox" th:field="*{disabledParkingRequired}"> Disabled parking required
				</label>
			</div>

			<button class="btn" type="submit">Save Vehicle</button>
		</form>

	</div>

</div>

</body>
</html>
