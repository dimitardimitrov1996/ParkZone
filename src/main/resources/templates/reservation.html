<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservation</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>.meta{margin:8px 0} .meta strong{display:inline-block;width:180px}</style>
</head>
<body>

<div class="navbar">
    <div><strong>ParkZone</strong></div>
    <div>
        <a href="/home">Home</a>
        <a href="/reservations">Reservations</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Reservation Details</h2>

        <div th:if="${reservation == null}">
            <p>Reservation not found.</p>
        </div>

        <div th:if="${reservation != null}">
            <div class="meta"><strong>Parking Lot:</strong> <span th:text="${reservation.parkingLot != null} ? ${reservation.parkingLot.name} : '—'">Lot A</span></div>
            <div class="meta"><strong>Vehicle:</strong> <span th:text="${reservation.vehicle != null} ? ${reservation.vehicle.registrationNumber} : '—'">ABC123</span></div>
            <div class="meta"><strong>Start:</strong> <span th:text="${#temporals.format(reservation.startDate,'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</span></div>
            <div class="meta"><strong>End:</strong> <span th:text="${#temporals.format(reservation.endDate,'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span></div>
            <div class="meta"><strong>Type:</strong> <span th:text="${reservation.reservationType}">HOUR</span></div>
            <div class="meta"><strong>Status:</strong> <span th:text="${reservation.status}">CONFIRMED</span></div>
            <div class="meta"><strong>Total Price:</strong> <span th:text="${reservation.totalPrice}">10.00</span></div>
            <div class="meta"><strong>Created On:</strong> <span th:text="${#temporals.format(reservation.createdOn,'yyyy-MM-dd HH:mm')}">2026-01-01 09:50</span></div>

            <div style="margin-top:16px">
                <a th:href="@{'/reservations/' + ${reservation.id} + '/edit'}" class="btn">Edit</a>
                <a th:href="@{'/reservations'}" class="btn" style="background:#6c757d;margin-left:8px">Back</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
